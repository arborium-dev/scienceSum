<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Palette Test</title>
    <style>
        :root {
            --color-primary: #2C5282;
            --color-background: #F5F5F5;
            --color-text: #2C2C2C;
        }

        body.palette-cyberpunk {
            --color-primary: #00ff41 !important;
            --color-background: #090a0f !important;
            --color-text: #00ff41 !important;
        }

        body.palette-sunset {
            --color-primary: #ff6b35 !important;
            --color-background: #161616 !important;
            --color-text: #ff6b35 !important;
        }

        body.palette-ocean {
            --color-primary: #1e90ff !important;
            --color-background: #0a1929 !important;
            --color-text: #1e90ff !important;
        }

        body {
            background: var(--color-background);
            color: var(--color-text);
            font-family: Arial, sans-serif;
            padding: 40px;
            transition: background 0.5s, color 0.5s;
        }

        .circle {
            width: 200px;
            height: 200px;
            border: 5px solid var(--color-primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px 0;
        }

        button:hover {
            opacity: 0.9;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        p {
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Test des Palettes de Couleur</h1>
    
    <div class="circle"></div>
    
    <button id="testButton">Changer la Palette 🎨</button>
    
    <p id="status">Palette actuelle: Professional Blue</p>

    <script>
        const palettes = ['default', 'palette-cyberpunk', 'palette-sunset', 'palette-ocean'];
        const paletteNames = ['Professional Blue', 'Cyberpunk Green', 'Sunset Orange', 'Ocean Blue'];
        let currentIndex = 0;

        const button = document.getElementById('testButton');
        const status = document.getElementById('status');

        button.addEventListener('click', function() {
            console.log('Button clicked!');
            
            currentIndex = (currentIndex + 1) % palettes.length;
            const newPalette = palettes[currentIndex];
            
            console.log('Current palette:', newPalette);
            
            // Remove all palette classes
            document.body.classList.remove('palette-cyberpunk', 'palette-sunset', 'palette-ocean');
            
            // Add new palette class
            if (newPalette !== 'default') {
                document.body.classList.add(newPalette);
                console.log('Added class:', newPalette);
            }
            
            status.textContent = 'Palette actuelle: ' + paletteNames[currentIndex];
        });

        console.log('Script loaded. Click the button to test palette switching.');
    </script>
</body>
</html>
